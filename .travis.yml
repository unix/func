language: node_js

node_js:
  - 16.4.0

cache:
  directories:
    - '~/.pnpm-store'
    - 'node_modules'

notifications:
  email:
    on_success: never

branches:
  only:
    - master

install:
  - npm install -g pnpm@7.33.7
  - pnpm config set store-dir ~/.pnpm-store
  - pnpm install --frozen-lockfile

script:
  - pnpm build
